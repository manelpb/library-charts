global:
  # -- Set an override for the prefix of the fullname
  nameOverride:
  # -- Set the entire name definition
  fullnameOverride:
  # -- Set additional global labels. Helm templates can be used.
  labels: {}
  # -- Set additional global annotations. Helm templates can be used.
  annotations: {}

controller:
  # -- enable the controller.
  enabled: true
  # -- Set the controller type.
  # Valid options are deployment, daemonset, statefulset, cronjob or job
  type: deployment
  # -- Set annotations on the deployment/statefulset/daemonset
  annotations: {}
  # -- Set labels on the deployment/statefulset/daemonset
  labels: {}
  # -- Number of desired pods
  replicas: 1
  # -- Set the controller upgrade strategy
  # For Deployments, valid values are Recreate and RollingUpdate (default).
  # For StatefulSets, valid values are OnDelete and RollingUpdate (default).
  # DaemonSets ignore this.
  strategy:
  rollingUpdate:
    # -- Set deployment RollingUpdate max unavailable
    unavailable:
    # -- Set deployment RollingUpdate max surge
    surge:
    # -- Set statefulset RollingUpdate partition
    partition:
  # -- ReplicaSet revision history limit
  revisionHistoryLimit: 3
  # -- Set the maximum time in seconds for a deployment to make progress before
  # being considered failed. This helps ArgoCD detect stuck rollouts (e.g. ImagePullBackOff).
  # Defaults to 600 (Kubernetes default). Only applies to Deployments.
  progressDeadlineSeconds:
  # -- Set statefulset podManagementPolicy, valid values are Parallel and OrderedReady (default).
  podManagementPolicy:

  # -- Pod restartPolicy for `cronjob`/`job` controllers. Defaults to `Never`.
  # Valid options are `Never` and `OnFailure`.
  restartPolicy:

  # -- CronJob configuration. Only used when `controller.type` is `cronjob`.
  # @default -- See below
  cronjob:
    # -- Cron schedule. Required when `controller.type` is `cronjob`.
    schedule:  # "0 4 * * *"
    # -- IANA time zone for the schedule (Kubernetes >=1.27).
    timeZone:  # "Etc/UTC"
    # -- How to treat concurrent executions. Options: Allow, Forbid, Replace.
    concurrencyPolicy:  # Forbid
    # -- Deadline in seconds for starting a job if it misses its schedule.
    startingDeadlineSeconds:
    # -- Suspend subsequent executions.
    suspend:  # false
    # -- How many completed jobs to keep.
    successfulJobsHistoryLimit:  # 3
    # -- How many failed jobs to keep.
    failedJobsHistoryLimit:  # 1

  # -- Job configuration. Used when `controller.type` is `cronjob` or `job`.
  # @default -- See below
  job:
    # -- Number of retries before marking the job failed.
    backoffLimit:  # 6
    # -- Desired number of successfully finished pods.
    completions:
    # -- Maximum desired number of pods running at any instant.
    parallelism:
    # -- Deadline in seconds before the job is terminated.
    activeDeadlineSeconds:
    # -- TTL in seconds to clean up a finished job. `0` deletes immediately.
    ttlSecondsAfterFinished:  # 86400
    # -- Job completion mode. Options: NonIndexed (default), Indexed.
    completionMode:

image:
  # -- image repository
  repository:
  # -- image tag
  tag:
  # -- image pull policy
  pullPolicy:

# -- Set image pull secrets
imagePullSecrets: []

# -- Override the command(s) for the default container
command: []
# -- Override the args for the default container
args: []

# -- Set annotations on the pod
podAnnotations: {}

# -- Set labels on the pod
podLabels: {}

# -- Add a Horizontal Pod Autoscaler
# @default -- <disabled>
autoscaling:
  enabled: false
  target:  # deploymentname
  minReplicas:  # 1
  maxReplicas:  # 100
  targetCPUUtilizationPercentage:  # 80
  targetMemoryUtilizationPercentage:  # 80

# -- Add a PodDisruptionBudget for the controller's pods.
# Set only one of `minAvailable` or `maxUnavailable`. If neither is set,
# `minAvailable: 1` is used. The selector is wired to the chart's pods.
# @default -- <disabled>
podDisruptionBudget:
  enabled: false
  # -- Minimum number/percentage of pods that must remain available.
  minAvailable:  # 1
  # -- Maximum number/percentage of pods that can be unavailable.
  maxUnavailable:  # "50%"
  # -- Eviction policy for unhealthy pods (Kubernetes >=1.27).
  # Options: IfHealthyBudget (default), AlwaysAllow.
  unhealthyPodEvictionPolicy:
  # -- Labels to add to the PodDisruptionBudget
  labels: {}
  # -- Annotations to add to the PodDisruptionBudget
  annotations: {}

# -- Add a Prometheus Operator ServiceMonitor. Selector and namespaceSelector
# are wired to the chart's service automatically. Requires the Prometheus
# Operator CRDs.
# @default -- <disabled>
serviceMonitor:
  enabled: false
  # -- Scrape endpoints. If empty, a single endpoint is derived from the
  # primary service port using `path`/`interval` below.
  endpoints: []
    # - port: metrics
    #   path: /metrics
    #   interval: 30s
  # -- Default scrape path for the derived endpoint.
  path:  # /metrics
  # -- Default scrape interval for the derived endpoint.
  interval:  # 30s
  # -- Default scrape timeout for the derived endpoint.
  scrapeTimeout:
  # -- jobLabel to use for the scrape job.
  jobLabel:
  # -- Service labels to transfer onto the scraped target.
  targetLabels: []
  # -- Extra labels (e.g. `release: kube-prometheus-stack` for Prometheus selection).
  labels: {}
  # -- Annotations to add to the ServiceMonitor.
  annotations: {}

# -- Add a Prometheus Operator PodMonitor. Selector and namespaceSelector are
# wired to the chart's pods automatically. Requires the Prometheus Operator CRDs.
# @default -- <disabled>
podMonitor:
  enabled: false
  # -- Pod scrape endpoints. Required when enabled.
  podMetricsEndpoints: []
    # - port: metrics
    #   path: /metrics
    #   interval: 30s
  # -- jobLabel to use for the scrape job.
  jobLabel:
  # -- Extra labels (e.g. `release: kube-prometheus-stack`).
  labels: {}
  # -- Annotations to add to the PodMonitor.
  annotations: {}

serviceAccount:
  # -- Specifies whether a service account should be created
  create: false

  # -- Annotations to add to the service account
  annotations: {}

  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- Specifies whether a service account token should be automatically mounted.
automountServiceAccountToken: true

# -- Configure RBAC for the chart here. Each key creates a Role/ClusterRole
# (with the given rules) plus a matching binding wired to the chart's
# ServiceAccount. Set an existing role to bind to it instead of creating one.
# Typically used together with `serviceAccount.create: true`.
# @default -- See below
rbac:
  main:
    # -- Enables or disables this RBAC item
    enabled: false
    # -- Role scope. Options: `Role` (namespaced) or `ClusterRole`.
    type: Role
    # -- Override the name suffix used for the role and binding.
    nameOverride:
    # -- Bind to this existing (Cluster)Role instead of creating one.
    # When set, `rules` is ignored and no role is created.
    existingRole:
    # -- Policy rules. Required unless `existingRole` is set.
    rules: []
      # - apiGroups: [""]
      #   resources: [pods]
      #   verbs: [get, list, watch]
    # -- Labels to add to the role and binding
    labels: {}
    # -- Annotations to add to the role and binding
    annotations: {}

# -- Use this to populate a secret with the values you specify.
# Be aware that these values are not encrypted by default, and could therefore visible
# to anybody with access to the values.yaml file.
secret: {}
  # PASSWORD: my-password

# -- Configure ExternalSecrets (External Secrets Operator) for the chart here.
# Each key creates an `ExternalSecret` that syncs from an existing
# SecretStore/ClusterSecretStore into a Kubernetes Secret. The store itself is
# NOT created by this chart. Additional items can be added by adding a
# dictionary key similar to 'main'.
# @default -- See below
externalSecrets:
  main:
    # -- Enables or disables the ExternalSecret
    enabled: false

    # -- Override the name suffix used for this ExternalSecret (and its target Secret)
    nameOverride:

    # -- Labels to add to the ExternalSecret
    labels: {}

    # -- Annotations to add to the ExternalSecret
    annotations: {}

    # -- How often the operator reconciles the secret. Omitted from output if empty.
    refreshInterval: 1h

    # -- Reference to an existing SecretStore or ClusterSecretStore.
    secretStoreRef:
      # -- Name of the (Cluster)SecretStore. Required when enabled.
      name:
      # -- Kind of store. Options: `ClusterSecretStore` (default) or `SecretStore`.
      kind: ClusterSecretStore

    # -- Target Kubernetes Secret configuration.
    # @default -- See below
    target:
      # -- Name of the resulting Secret. Defaults to the ExternalSecret name.
      secretName:
      # -- creationPolicy for the target Secret. Options: Owner (default), Orphan, Merge, None.
      creationPolicy: Owner
      # -- deletionPolicy for the target Secret. Options: Retain, Delete, Merge.
      deletionPolicy:
      # -- Template used to shape the resulting Secret (e.g. build a connection string).
      template: {}

    # -- Pull entire remote secrets.
    # [[ref]](https://external-secrets.io/latest/api/externalsecret/)
    dataFrom: []
    #  - extract:
    #      key: my-remote-secret

    # -- Pull individual keys from a remote secret.
    # [[ref]](https://external-secrets.io/latest/api/externalsecret/)
    data: []
    #  - secretKey: password
    #    remoteRef:
    #      key: my-remote-secret
    #      property: password

# -- Configure configMaps for the chart here.
# Additional configMaps can be added by adding a dictionary key similar to the 'config' object.
# @default -- See below
configmap:
  config:
    # -- Enables or disables the configMap
    enabled: false
    # -- Labels to add to the configMap
    labels: {}
    # -- Annotations to add to the configMap
    annotations: {}
    # -- configMap data content. Helm template enabled.
    data: {}
      # foo: bar

# -- Main environment variables. Template enabled.
# Syntax options:
# A) TZ: UTC
# B) PASSWD: '{{ .Release.Name }}'
# C) PASSWD:
#      configMapKeyRef:
#        name: config-map-name
#        key: key-name
# D) PASSWD:
#      valueFrom:
#        secretKeyRef:
#          name: secret-name
#          key: key-name
#      ...
# E) - name: TZ
#      value: UTC
# F) - name: TZ
#      value: '{{ .Release.Name }}'
env:

# -- Secrets and/or ConfigMaps that will be loaded as environment variables.
# [[ref]](https://unofficial-kubernetes.readthedocs.io/en/latest/tasks/configure-pod-container/configmap/#use-case-consume-configmap-in-environment-variables)
envFrom: []
# - configMapRef:
#     name: config-map-name
# - secretRef:
#     name: secret-name

# -- Custom priority class for different treatment by the scheduler
priorityClassName:  # system-node-critical

# -- Allow specifying a runtimeClassName other than the default one (ie: nvidia)
runtimeClassName:  # nvidia

# -- Allows specifying a custom scheduler name
schedulerName:  # awkward-dangerous-scheduler

# -- Allows specifying explicit hostname setting
hostname:

# -- When using hostNetwork make sure you set dnsPolicy to `ClusterFirstWithHostNet`
hostNetwork: false

# -- Defaults to "ClusterFirst" if hostNetwork is false and "ClusterFirstWithHostNet" if hostNetwork is true.
dnsPolicy:  # ClusterFirst

# -- Optional DNS settings, configuring the ndots option may resolve nslookup issues on some Kubernetes setups.
dnsConfig: {}
#   options:
#     - name: ndots
#       value: "1"

# -- Enable/disable the generation of environment variables for services.
# [[ref]](https://kubernetes.io/docs/concepts/services-networking/connect-applications-service/#accessing-the-service)
enableServiceLinks: true

# -- Configure the Security Context for the Pod
podSecurityContext: {}

# -- Configure the Security Context for the main container
securityContext: {}

# -- Configure the lifecycle for the main container
lifecycle: {}

# -- Specify any initContainers here as dictionary items. Each initContainer should have its own key.
# The dictionary item key will determine the order. Helm templates can be used.
initContainers: {}

# -- Specify any additional containers here as dictionary items. Each additional container should have its own key.
# Helm templates can be used.
additionalContainers: {}

# -- Probe configuration
# -- [[ref]](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
# @default -- See below
probes:
  # -- Liveness probe configuration
  # @default -- See below
  liveness:
    # -- Enable the liveness probe
    enabled: true
    # -- Set this to `true` if you wish to specify your own livenessProbe
    custom: false
    # -- The spec field contains the values for the default livenessProbe.
    # If you selected `custom: true`, this field holds the definition of the livenessProbe.
    # @default -- See below
    spec:
      initialDelaySeconds: 0
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3

  # -- Readiness probe configuration
  # @default -- See below
  readiness:
    # -- Enable the readiness probe
    enabled: true
    # -- Set this to `true` if you wish to specify your own readinessProbe
    custom: false
    # -- The spec field contains the values for the default readinessProbe.
    # If you selected `custom: true`, this field holds the definition of the readinessProbe.
    # @default -- See below
    spec:
      initialDelaySeconds: 0
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3

  # -- Startup probe configuration
  # @default -- See below
  startup:
    # -- Enable the startup probe
    enabled: true
    # -- Set this to `true` if you wish to specify your own startupProbe
    custom: false
    # -- The spec field contains the values for the default startupProbe.
    # If you selected `custom: true`, this field holds the definition of the startupProbe.
    # @default -- See below
    spec:
      initialDelaySeconds: 0
      timeoutSeconds: 1
      ## This means it has a maximum of 5*30=150 seconds to start up before it fails
      periodSeconds: 5
      failureThreshold: 30

termination:
  # -- Configure the path at which the file to which the main container's termination message will be written.
  # -- [[ref](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#lifecycle-1)]
  messagePath:

  # -- Indicate how the main container's termination message should be populated.
  # Valid options are `File` and `FallbackToLogsOnError`.
  # -- [[ref](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#lifecycle-1)]
  messagePolicy:

  # -- Duration in seconds the pod needs to terminate gracefully
  # -- [[ref](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#lifecycle)]
  gracePeriodSeconds:

# -- Configure the services for the chart here.
# Additional services can be added by adding a dictionary key similar to the 'main' service.
# @default -- See below
service:
  main:
    # -- Enables or disables the service
    enabled: true

    # -- Make this the primary service (used in probes, notes, etc...).
    # If there is more than 1 service, make sure that only 1 service is marked as primary.
    primary: true

    # -- Override the name suffix that is used for this service
    nameOverride:

    # -- Set the service type
    type: ClusterIP

    # -- Specify the externalTrafficPolicy for the service. Options: Cluster, Local
    # -- [[ref](https://kubernetes.io/docs/tutorials/services/source-ip/)]
    externalTrafficPolicy:

    # -- Specify the ip policy. Options: SingleStack, PreferDualStack, RequireDualStack
    ipFamilyPolicy:
    # -- The ip families that should be used. Options: IPv4, IPv6
    ipFamilies: []

    # -- Provide additional annotations which may be required.
    annotations: {}

    # -- Provide additional labels which may be required.
    labels: {}

    # -- Configure the Service port information here.
    # Additional ports can be added by adding a dictionary key similar to the 'http' service.
    # @default -- See below
    ports:
      http:
        # -- Enables or disables the port
        enabled: true

        # -- Make this the primary port (used in probes, notes, etc...)
        # If there is more than 1 service, make sure that only 1 port is marked as primary.
        primary: true

        # -- The port number
        port:

        # -- Port protocol.
        # Support values are `HTTP`, `HTTPS`, `TCP` and `UDP`.
        # HTTPS and HTTPS spawn a TCP service and get used for internal URL and name generation
        protocol: HTTP

        # -- Specify a service targetPort if you wish to differ the service port from the application port.
        # If `targetPort` is specified, this port number is used in the container definition instead of
        # the `port` value. Therefore named ports are not supported for this field.
        targetPort:

        # -- Specify the nodePort value for the LoadBalancer and NodePort service types.
        # [[ref]](https://kubernetes.io/docs/concepts/services-networking/service/#type-nodeport)
        nodePort:

# -- Configure the ingresses for the chart here.
# Additional ingresses can be added by adding a dictionary key similar to the 'main' ingress.
# @default -- See below
ingress:
  main:
    # -- Enables or disables the ingress
    enabled: false

    # -- Make this the primary ingress (used in probes, notes, etc...).
    # If there is more than 1 ingress, make sure that only 1 ingress is marked as primary.
    primary: true

    # -- Override the name suffix that is used for this ingress.
    nameOverride:

    # -- Provide additional annotations which may be required.
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"

    # -- Provide additional labels which may be required.
    labels: {}

    # -- Set the ingressClass that is used for this ingress.
    # Requires Kubernetes >=1.19
    ingressClassName:  # "nginx"

    ## Configure the hosts for the ingress
    hosts:
      -  # -- Host address. Helm template can be passed.
        host: chart-example.local
        ## Configure the paths for the host
        paths:
          -  # -- Path.  Helm template can be passed.
            path: /
            # -- Ignored if not kubeVersion >= 1.14-0
            pathType: Prefix
            service:
              # -- Overrides the service name reference for this path
              name:
              # -- Overrides the service port reference for this path
              port:

    # -- Configure TLS for the ingress. Both secretName and hosts can process a Helm template.
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

# -- Configure persistence for the chart here.
# Additional items can be added by adding a dictionary key similar to the 'config' key.
# [[ref]](https://kubernetes.io/docs/concepts/storage/persistent-volumes/)
# @default -- See below
persistence:
  # -- Default persistence for configuration files.
  # @default -- See below
  config:
    # -- Enables or disables the persistence item
    enabled: false

    # -- Sets the persistence type
    # Valid options are pvc, emptyDir, hostPath, secret, configMap or custom
    type: pvc

    # -- Where to mount the volume in the main container.
    # Defaults to `/<name_of_the_volume>`,
    # setting to '-' creates the volume but disables the volumeMount.
    mountPath:  # /config
    # -- Specify if the volume should be mounted read-only.
    readOnly: false
    # -- Override the name suffix that is used for this volume.
    nameOverride:

    # -- Storage Class for the config volume.
    # If set to `-`, dynamic provisioning is disabled.
    # If set to something else, the given storageClass is used.
    # If undefined (the default) or set to null, no storageClassName spec is set, choosing the default provisioner.
    storageClass:  # "-"

    # -- If you want to reuse an existing claim, the name of the existing PVC can be passed here.
    existingClaim:  # your-claim

    # -- Used in conjunction with `existingClaim`. Specifies a sub-path inside the referenced volume instead of its root
    subPath:  # some-subpath

    # -- AccessMode for the persistent volume.
    # Make sure to select an access mode that is supported by your storage provider!
    # [[ref]](https://kubernetes.io/docs/concepts/storage/persistent-volumes/#access-modes)
    accessMode: ReadWriteOnce

    # -- The amount of storage that is requested for the persistent volume.
    size: 1Gi

    # -- Set to true to retain the PVC upon `helm uninstall`
    retain: false

  # -- Create an emptyDir volume to share between all containers
  # [[ref]]https://kubernetes.io/docs/concepts/storage/volumes/#emptydir)
  # @default -- See below
  shared:
    enabled: false
    type: emptyDir
    mountPath: /shared

    # -- Set the medium to "Memory" to mount a tmpfs (RAM-backed filesystem) instead
    # of the storage medium that backs the node.
    medium:  # Memory

    # -- If the `SizeMemoryBackedVolumes` feature gate is enabled, you can
    # specify a size for memory backed volumes.
    sizeLimit:  # 1Gi

# -- Used in conjunction with `controller.type: statefulset` to create individual disks for each instance.
volumeClaimTemplates: []
# - name: data
#   mountPath: /data
#   accessMode: "ReadWriteOnce"
#   size: 1Gi
# - name: backup
#   mountPath: /backup
#   subPath: theSubPath
#   accessMode: "ReadWriteOnce"
#   size: 2Gi
#   storageClass: cheap-storage-class

# -- Node selection constraint
# [[ref]](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector)
nodeSelector: {}

# -- Defines affinity constraint rules.
# [[ref]](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity)
affinity: {}

# -- Defines topologySpreadConstraint rules.
# [[ref]](https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/)
topologySpreadConstraints: []
# - maxSkew: <integer>
#   topologyKey: <string>
#   whenUnsatisfiable: <string>
#   labelSelector: <object>

# -- Specify taint tolerations
# [[ref]](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/)
tolerations: []

# -- Use hostAliases to add custom entries to /etc/hosts - mapping IP addresses to hostnames.
# [[ref]](https://kubernetes.io/docs/concepts/services-networking/add-entries-to-pod-etc-hosts-with-host-aliases/)
hostAliases: []
# - ip: "192.168.1.100"
#   hostnames:
#   - "example.com"
#   - "www.example.com"

# -- Set the resource requests / limits for the main container.
resources: {}
  ## We usually recommend not to specify default resources and to leave this as a conscious
  ## choice for the user. This also increases chances charts run on environments with little
  ## resources, such as Minikube. If you do want to specify resources, uncomment the following
  ## lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
