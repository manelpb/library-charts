suite: pod disruption budget
templates:
  - common.yaml
tests:
  - it: is not rendered by default
    set:
      controller.enabled: false
      service.main.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders with default minAvailable and selector
    set:
      controller.enabled: false
      service.main.enabled: false
      podDisruptionBudget:
        enabled: true
    asserts:
      - documentIndex: 0
        isKind:
          of: PodDisruptionBudget
      - documentIndex: 0
        isAPIVersion:
          of: policy/v1
      - documentIndex: 0
        equal:
          path: metadata.name
          value: RELEASE-NAME-common-test
      - documentIndex: 0
        equal:
          path: spec.minAvailable
          value: 1
      - documentIndex: 0
        equal:
          path: spec.selector.matchLabels
          value:
            app.kubernetes.io/name: common-test
            app.kubernetes.io/instance: RELEASE-NAME

  - it: supports maxUnavailable
    set:
      controller.enabled: false
      service.main.enabled: false
      podDisruptionBudget:
        enabled: true
        maxUnavailable: "50%"
    asserts:
      - documentIndex: 0
        equal:
          path: spec.maxUnavailable
          value: "50%"
      - documentIndex: 0
        notExists:
          path: spec.minAvailable

  - it: supports an explicit minAvailable
    set:
      controller.enabled: false
      service.main.enabled: false
      podDisruptionBudget:
        enabled: true
        minAvailable: 2
    asserts:
      - documentIndex: 0
        equal:
          path: spec.minAvailable
          value: 2

  - it: fails when both minAvailable and maxUnavailable are set
    set:
      controller.enabled: false
      service.main.enabled: false
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
        maxUnavailable: 1
    asserts:
      - failedTemplate:
          errorMessage: "podDisruptionBudget: set only one of minAvailable or maxUnavailable"
