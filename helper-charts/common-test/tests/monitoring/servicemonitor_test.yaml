suite: servicemonitor
templates:
  - common.yaml
tests:
  - it: is not rendered by default
    set:
      controller.enabled: false
      service.main.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders with explicit endpoints, auto selector and namespaceSelector
    set:
      controller.enabled: false
      service.main.enabled: false
      serviceMonitor:
        enabled: true
        endpoints:
          - port: metrics
            path: /metrics
            interval: 15s
    asserts:
      - documentIndex: 0
        isKind:
          of: ServiceMonitor
      - documentIndex: 0
        isAPIVersion:
          of: monitoring.coreos.com/v1
      - documentIndex: 0
        equal:
          path: metadata.name
          value: RELEASE-NAME-common-test
      - documentIndex: 0
        equal:
          path: spec.selector.matchLabels
          value:
            app.kubernetes.io/name: common-test
            app.kubernetes.io/instance: RELEASE-NAME
      - documentIndex: 0
        equal:
          path: spec.namespaceSelector.matchNames[0]
          value: NAMESPACE
      - documentIndex: 0
        equal:
          path: spec.endpoints[0].port
          value: metrics
      - documentIndex: 0
        equal:
          path: spec.endpoints[0].interval
          value: 15s

  - it: derives a default endpoint from the primary service port
    set:
      controller.enabled: false
      serviceMonitor:
        enabled: true
    asserts:
      - documentSelector:
          path: kind
          value: ServiceMonitor
        equal:
          path: spec.endpoints[0].port
          value: http
      - documentSelector:
          path: kind
          value: ServiceMonitor
        equal:
          path: spec.endpoints[0].path
          value: /metrics
